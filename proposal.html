<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question 💖</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ffe6f2 0%, #ffb3d9 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- FLOATING HEARTS --- */
        .heart {
            position: absolute;
            bottom: -100px;
            color: rgba(255, 77, 148, 0.3);
            font-size: 20px;
            user-select: none;
            animation: move 10s linear infinite;
            z-index: 1;
        }

        @keyframes move {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        #mainContent, #catContainer, #messageSelection {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 90%;
        }

        h1 { color: #ff4d94; font-size: 2.2rem; text-shadow: 2px 2px white; margin-bottom: 20px; }
        .buttons { display: flex; justify-content: center; gap: 30px; margin-top: 30px; position: relative; height: 60px; }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease;
        }

        #yesBtn { background-color: #ff4d94; color: white; box-shadow: 0 4px 15px rgba(255, 77, 148, 0.4); }
        #noBtn { background-color: #ffffff; color: #ff4d94; position: absolute; }

        #catContainer, #messageSelection { display: none; }
        img { max-width: 250px; border-radius: 15px; margin-bottom: 20px; }

        textarea {
            width: 100%;
            height: 80px;
            border-radius: 15px;
            border: 2px solid #ff4d94;
            padding: 10px;
            margin: 15px 0;
            font-family: inherit;
            box-sizing: border-box;
        }

        .send-btn { background-color: #4CAF50; color: white; width: 100%; }
    </style>
</head>
<body>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 7 + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 10000);
        }
        setInterval(createHeart, 500);
    </script>

    <audio id="happyMusic" preload="auto">
    <source src="perfect.mp3" type="audio/mpeg">
         </audio>

    <div id="mainContent">
        <h1>Will you be my girlfriend? 💖</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">Yes!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="catContainer">
        <h1>YAYYYYY! 🎉</h1>
        <img src="https://media.tenor.com/J79vXID_95gAAAAM/happy-cat-munchkins.gif" alt="Happy Cat">
        <div>
            <p style="color: #ff4d94; font-weight: bold;">You made me the happiest! Leave a message:</p>
            <textarea id="userMsg" placeholder="Write something sweet..."></textarea>
            <button class="send-btn" onclick="sendMessage()">Send to Me 💌</button>
        </div>
    </div>

    <div id="messageSelection">
        <h1>Message Received! 🕊️</h1>
        <p style="font-size: 1.5rem; color: #ff4d94;">I'm reading it right now!</p>
        <p>❤️ ❤️ ❤️</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const music = document.getElementById('happyMusic');

        // Dodge logic for "No" button
        noBtn.addEventListener('mouseover', () => {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            noBtn.style.left = `${Math.floor(Math.random() * maxX)}px`;
            noBtn.style.top = `${Math.floor(Math.random() * maxY)}px`;
        });

        function celebrate() {
            // Start the music on the interaction
            music.play().catch(e => console.log("Audio play prevented by browser."));
            
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('catContainer').style.display = 'block';

            // Confetti Cannon
            var end = Date.now() + (5 * 1000);
            (function frame() {
              confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4d94', '#ffffff'] });
              confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4d94', '#ffffff'] });
              if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        async function sendMessage() {
            const text = document.getElementById('userMsg').value;
            const endpoint = "https://formspree.io/f/YOUR_ID_HERE"; // <--- CHANGE THIS TO YOUR FORMSPREE ID

            if(!text.trim()) return alert("Please write a message! 😊");

            const btn = document.querySelector('.send-btn');
            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                document.getElementById('catContainer').style.display = 'none';
                document.getElementById('messageSelection').style.display = 'block';
            } catch (e) {
                alert("Error sending. Check your internet connection!");
                btn.innerText = "Send Message 💌";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
